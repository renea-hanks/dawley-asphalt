    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Consult with the Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Source+Serif+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="main-nav" style="padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0;">
        <div class="logo" style="font-family: 'Montserrat'; font-weight: 200; letter-spacing: 0.3rem;">DAWLEY</div>
        <div style="font-family: 'Montserrat'; font-size: 0.7rem; letter-spacing: 0.1rem;">
            <a href="index.html" style="text-decoration: none; color: #000; margin-right: 20px;">HOME</a>
            <a href="about.html" style="text-decoration: none; color: #000; margin-right: 20px;">PHILOSOPHY</a>
            <a href="services.html" style="text-decoration: none; color: #000; margin-right: 20px;">SERVICES</a>
            <a href="portfolio.html" style="text-decoration: none; color: #000;">PORTFOLIO</a>
        </div>
    </nav>

    <main style="padding: 5% 10%; max-width: 800px;">
        <h2 style="margin-bottom: 2rem; font-weight: 300; font-family: 'Montserrat';">Inquiry</h2>
        
        <p style="font-size: 1.2rem; margin-bottom: 3rem; line-height: 1.6;">
            To maintain our standard of "Business Balance," we personally review every project inquiry. Please provide the initial details of your commercial or residential asset below.
        </p>

        <div style="background: #fff; border: 1px solid #eee; padding: 3rem; box-shadow: 0 10px 30px rgba(0,0,0,0.02);">
            <form>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; font-family: 'Montserrat'; font-size: 0.6rem; letter-spacing: 0.1rem; margin-bottom: 0.5rem;">FULL NAME</label>
                    <input type="text" style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 0.5rem 0; outline: none; font-family: 'Source Serif Pro';">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; font-family: 'Montserrat'; font-size: 0.6rem; letter-spacing: 0.1rem; margin-bottom: 0.5rem;">PROJECT LOCATION (NEIGHBORHOOD)</label>
                    <input type="text" style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 0.5rem 0; outline: none; font-family: 'Source Serif Pro';">
                </div>
                <div style="margin-bottom: 3rem;">
                    <label style="display: block; font-family: 'Montserrat'; font-size: 0.6rem; letter-spacing: 0.1rem; margin-bottom: 0.5rem;">NATURE OF INQUIRY</label>
                    <textarea rows="4" style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 0.5rem 0; outline: none; font-family: 'Source Serif Pro'; resize: none;"></textarea>
                </div>
                
                <button type="button" style="background: #1a1a1a; color: #fff; border: none; padding: 1rem 3rem; font-family: 'Montserrat'; font-size: 0.7rem; letter-spacing: 0.2rem; cursor: pointer;">
                    SUBMIT TO PRINCIPAL
                </button>
            </form>
        </div>

        <p style="margin-top: 4rem; font-size: 0.8rem; color: #888; font-family: 'Montserrat';">
            ESTABLISHED 1999 &bull; COLORADO SPRINGS, CO
        </p>
    </main>
<script>
  async function sendInquiry() {
    const name = document.querySelector('input[type="text"]').value;
    const location = document.querySelectorAll('input[type="text"]')[1].value;
    const message = document.querySelector('textarea').value;
    
    const processInquiry = functions.httpsCallable('processInquiry');
    
    try {
      const result = await processInquiry({ name, location, message });
      alert(result.data.response);
    } catch (error) {
      console.error(error);
      alert("Jerry's office is currently offline. Please try again shortly.");
    }
  }

  // Attach the function to the button
  document.querySelector('button').onclick = sendInquiry;
</script>
</body>
</html>
